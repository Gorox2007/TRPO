services:
  postgres:
    image: postgres:16
    container_name: cache-practice-postgres
    environment:
      POSTGRES_DB: cache_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - ./init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7
    container_name: cache-practice-redis
    ports:
      - "56379:6379"
